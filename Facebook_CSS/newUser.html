<html>
<head>
  <title>Sign Up for Mini Facebook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="UsingCSS.css">
</head>
<body>

  <div class="container">
    <div class="row center-text">
      <div class="col-12 col-s-12">
        <h1>Personal Info</h1>
      </div>
    </div>

    <div class="row" style="max-width: 800px; margin: 0 auto;">
      <div class="col-12 col-s-12">

        <!-- Main signup form -->
        <form id="form_1" action="addUser.jsp" method="post">

          <!-- Username -->
          <div class="row">
            <div class="col-12 col-s-12">
              <label>Username:</label>
              <input type="text" id="userName" name="userName" class="input-field" />
            </div>
          </div>

          <!-- Password -->
          <div class="row">
            <div class="col-12 col-s-12">
              <label>Password:</label>
              <input type="password" id="userPass" name="userPass" class="input-field" />
            </div>
          </div>

          <!-- Name -->
          <div class="row">
            <div class="col-12 col-s-12">
              <label>Name:</label>
              <input type="text" id="completeName" name="completeName" class="input-field" />
            </div>
          </div>

          <!-- Date of Birth -->
          <div class="row">
            <div class="col-12 col-s-12">
              <label>Date of birth:</label>
              <input type="date" id="DateofBirth" name="DateofBirth" class="input-field" />
            </div>
          </div>

          <!-- Gender -->
          <div class="row">
            <div class="col-12 col-s-12">
              <label>Gender:</label>
              <select id="Gender" name="Gender" class="input-field">
                <option value="">--Select--</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <!-- Address Fields -->
          <div class="row">
            <div class="col-12 col-s-12">
              <label>Street:</label>
              <input type="text" id="Street" name="Street" class="input-field" />
            </div>
          </div>

          <div class="row">
            <div class="col-12 col-s-12">
              <label>Town:</label>
              <input type="text" id="Town" name="Town" class="input-field" />
            </div>
          </div>

          <div class="row">
            <div class="col-12 col-s-12">
              <label>State:</label>
              <input type="text" id="State" name="State" class="input-field" />
            </div>
          </div>

          <div class="row">
            <div class="col-12 col-s-12">
              <label>Country:</label>
              <input type="text" id="Country" name="Country" class="input-field" />
            </div>
          </div>

          <!-- Degree & School -->
          <div class="row">
            <div class="col-12 col-s-12">
              <label>Degree:</label>
              <input type="text" id="Degree" name="Degree" class="input-field" />
            </div>
          </div>

          <div class="row">
            <div class="col-12 col-s-12">
              <label>School:</label>
              <input type="text" id="School" name="School" class="input-field" />
            </div>
          </div>

          <!-- Hidden Role -->
          <input type="hidden" name="roleId" value="rol3" />

          <!-- Buttons -->
          <div class="row center-text" style="margin-top: 16px;">
            <div class="col-6 col-s-6">
              <input type="submit" class="button" value="Sign Up" />
            </div>
            <div class="col-6 col-s-6">
              <input type="reset" class="button" value="Reset" />
            </div>
          </div>
        </form>

        <!-- Login button -->
        <form id="form_2" action="loginHashing.html" method="post" style="margin-top: 20px;">
          <input type="submit" class="button" value="Log in" />
        </form>

      </div>
    </div>
  </div>

</body>
</html>
